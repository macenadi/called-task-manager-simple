<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JR Library</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        section { margin-bottom: 40px; padding: 20px; background: #e98f8f; border-radius: 8px;}
        input { padding: 8px; font-size: 16px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;}
        button:hover { background: #00b30f; }
        
        /* Error class for validation */
        .input-error { border: 2px solid red; background-color: #fa7070; }
    </style>
    <script defer src="script.js"></script>
</head>
<body>

    <h1>Welcome to JR Library</h1>

    <!-- Simple Button -->
    <section>
        <h2>Frontend Branch</h2>
        <p id="status-text">Waiting for user...</p>
        <button onclick="updateStatus()">Complete Task</button>
    </section>

    <!-- SECTION 2: Text Input -->
    <section>
        <h2>Input you name</h2>
        <input type="text" id="user-name" placeholder="Enter your name">
        <button onclick="greetUser()">Say Hello</button>
        <p id="greeting-msg"></p>
    </section>

    <!-- SECTION:  Number Input -->
    <section>
    <h2>Age Checker</h2>
    <input type="number" id="user-age" placeholder="Enter age">
    <button onclick="checkAge()">Check Age</button>
    <p id="age-msg"></p>
    </section>



</body>
</html>
